openapi: "3.0.3"
info:
  title: graphmcp MCP API
  version: v0.2.3-beta
  description: graphmcp MCP tools/call 契约（非 HTTP REST）。实际传输：JSON-RPC 2.0 over stdio（graphmcp serve）。本文档由 graphmcp dump-tools 从 toolList() 自动生成。
servers:
  - url: "mcp://graphmcp"
    description: 本地 MCP 进程（示意，非真实 HTTP）
paths:
  /graph_create:
    post:
      operationId: graph_create
      summary: graph_create
      description: "Parse structured diagram content into the unified graph model, optionally validate and auto-layout, and save to the versioned store. Returns the graph id."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: "diagram source text (Mermaid, Markdown outline, CSV, XML or Excalidraw JSON)"
                format:
                  type: string
                  description: "input format: mermaid|markdown|csv|xml|excalidraw|model|auto (default auto)"
                type:
                  type: string
                  description: "diagram type override: flowchart|architecture|er|orgchart|mindmap|whiteboard"
                name:
                  type: string
                  description: human readable graph name
                no_validate:
                  type: boolean
                  description: skip structural validation (default false)
                no_layout:
                  type: boolean
                  description: skip automatic layout (default false)
                note:
                  type: string
                  description: version note
              required:
                - content
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_convert:
    post:
      operationId: graph_convert
      summary: graph_convert
      description: One-shot conversion between diagram formats without saving to the store.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: diagram source text to convert
                format:
                  type: string
                  description: input format (default auto)
                to:
                  type: string
                  description: "target format: drawio|mermaid|excalidraw|svg|png|pdf|model|url"
              required:
                - content
                - to
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_export:
    post:
      operationId: graph_export
      summary: graph_export
      description: "Export a stored graph to a file or inline content. png/pdf use an external converter when available, otherwise an SVG fallback is written."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id returned by graph_create
                to:
                  type: string
                  description: "target format: drawio|mermaid|excalidraw|svg|png|pdf|url|model"
                path:
                  type: string
                  description: output file path (optional; content returned inline when omitted)
                version:
                  type: number
                  description: "specific version to export (default: latest)"
              required:
                - id
                - to
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_open:
    post:
      operationId: graph_open
      summary: graph_open
      description: "Open a stored graph in an external editor: generates a mermaid.live browser URL or writes a .drawio/.excalidraw/.svg file and launches the OS default handler."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id to open
                editor:
                  type: string
                  description: "target editor: browser | drawio | excalidraw | svg (default browser)"
                editorPath:
                  type: string
                  description: explicit editor executable path (overrides auto-detection and GRAPHMCP_EDITOR env var)
                version:
                  type: number
                  description: "version to open (default: latest)"
                launch:
                  type: boolean
                  description: actually launch the OS handler (default true; set false to only generate URL/file; also honored via GRAPHMCP_NO_LAUNCH=1)
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_import:
    post:
      operationId: graph_import
      summary: graph_import
      description: "Re-import an externally edited diagram: reads the open.<ext> file (or provided content), parses it, validates, and saves as a new version."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id to re-import after external edit
                content:
                  type: string
                  description: edited diagram source (optional; auto-detects open.<ext> from store)
                format:
                  type: string
                  description: "input format: drawio|excalidraw|mermaid|markdown|csv|xml|auto (default auto)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_validate:
    post:
      operationId: graph_validate
      summary: graph_validate
      description: "Validate graph structure: duplicate ids, dangling edges, hierarchy cycles, isolated nodes. Returns {valid, issues[]}."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: diagram source to validate (alternative to id)
                format:
                  type: string
                  description: input format (default auto)
                id:
                  type: string
                  description: stored graph id to validate (alternative to content)
                strict:
                  type: boolean
                  description: treat warnings as errors
              required: []
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_list:
    post:
      operationId: graph_list
      summary: graph_list
      description: "List all graphs in the store with type, version count and timestamps."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: filter by diagram type
                format:
                  type: string
                  description: "output format: table|json (default json)"
              required: []
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_history:
    post:
      operationId: graph_history
      summary: graph_history
      description: Show the saved version history of a graph with optional limit and format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                limit:
                  type: number
                  description: "max entries to return (default: all)"
                format:
                  type: string
                  description: "output format: full|oneline (default full)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_rollback:
    post:
      operationId: graph_rollback
      summary: graph_rollback
      description: "Restore an old version as the new latest version (non-destructive: old snapshot saved as new version)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                version:
                  type: number
                  description: version number to roll back to
              required:
                - id
                - version
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_layout:
    post:
      operationId: graph_layout
      summary: graph_layout
      description: "Apply automatic layout to a stored graph. Supports layered (flowchart), tree-h (mindmap), tree-v (orgchart), grid, and auto strategies. Optionally saves the result as a new version."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                strategy:
                  type: string
                  description: "layout strategy: auto|layered|tree-h|tree-v|grid (default auto)"
                save:
                  type: boolean
                  description: save layout result back to store (default false)
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_delete:
    post:
      operationId: graph_delete
      summary: graph_delete
      description: Delete a graph and all its version history from the store. This operation is irreversible.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id to delete
                force:
                  type: boolean
                  description: skip confirmation (required)
              required:
                - id
                - force
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_show:
    post:
      operationId: graph_show
      summary: graph_show
      description: "Show graph summary, node details, or edge details. Without node/edge params, returns the full structure (nodes + edges list). Use --path to show only a properties subtree."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                node:
                  type: string
                  description: show details for a specific node id
                edge:
                  type: string
                  description: show details for a specific edge id
                path:
                  type: string
                  description: "JSON path into properties to show only a subtree, e.g. sequence.participants"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_property:
    post:
      operationId: graph_property
      summary: graph_property
      description: "Read, set, insert, or delete properties sub-data. Use --action get to read a value at a path. Use --action set to write a value at a path. Use --action insert to push into an array. Use --action delete to remove at a path. Changes go to the draft."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                action:
                  type: string
                  description: "action: get|set|insert|delete (default get)"
                path:
                  type: string
                  description: "JSON path into properties, e.g. sequence.participants[0].label or gantt.sections[0].tasks"
                value:
                  type: string
                  description: "New value (for set/insert). JSON string, number, or object string."
                index:
                  type: number
                  description: "Insertion index (default: append to end)"
              required:
                - id
                - action
                - path
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_update:
    post:
      operationId: graph_update
      summary: graph_update
      description: Update node/edge attributes via cursor operation. Changes go to the draft. Use --node/--edge for single element or --selector for batch. Multiple --set flags allowed (supports fillColor/strokeColor).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                node:
                  type: string
                  description: target node id
                edge:
                  type: string
                  description: target edge id
                selector:
                  type: string
                  description: "batch selector: shape=rect|label~=Step|parent=g1"
                set:
                  type: string
                  description: field=value pairs (can be specified multiple times); node fields include label/shape/parent/style/fillColor/strokeColor/x/y/w/h; edge fields include from/to/label/style/arrow/strokeColor
              required:
                - id
                - set
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_insert:
    post:
      operationId: graph_insert
      summary: graph_insert
      description: "Insert a node or edge into the graph. Changes go to the draft. For nodes: specify type, label, position, size, parent, fillColor, strokeColor. For edges: specify from, to, label, style, arrow, strokeColor."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                element:
                  type: string
                  description: "element type to insert: node|edge"
                type:
                  type: string
                  description: "node shape: rect|round|diamond|ellipse|circle|stadium|group (default rect)"
                label:
                  type: string
                  description: element label
                position:
                  type: string
                  description: "position as 'x y' (e.g. '400 200')"
                size:
                  type: string
                  description: "size as 'w h' (e.g. '120 50')"
                parent:
                  type: string
                  description: parent node id
                from:
                  type: string
                  description: edge source node id
                to:
                  type: string
                  description: edge target node id
                style:
                  type: string
                  description: "edge style: solid|dashed|thick (default solid)"
                arrow:
                  type: string
                  description: "edge arrow: arrow|none|both (default arrow)"
                fillColor:
                  type: string
                  description: "node fill color (e.g. #eef4ff); empty = default"
                strokeColor:
                  type: string
                  description: "node/edge stroke color (e.g. #4a72b8); empty = default"
              required:
                - id
                - element
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_delete_element:
    post:
      operationId: graph_delete_element
      summary: graph_delete_element
      description: Delete a node or edge from the graph via cursor. Changes go to the draft. Deleting a node cascades to its connected edges. Use --selector for batch deletion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                node:
                  type: string
                  description: node id to delete (cascades to connected edges)
                edge:
                  type: string
                  description: edge id to delete
                selector:
                  type: string
                  description: batch selector for mass deletion
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_status:
    post:
      operationId: graph_status
      summary: graph_status
      description: "Show working tree status: HEAD version, draft operation count, staged operation count, and whether the working tree is clean or dirty."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_draft:
    post:
      operationId: graph_draft
      summary: graph_draft
      description: "Manage the working draft. 'show' lists pending operations, 'status' compares draft vs latest (added/removed/modified counts), 'reset' discards all uncommitted changes (irreversible)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                action:
                  type: string
                  description: "action: show|reset|status (default show)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_stage:
    post:
      operationId: graph_stage
      summary: graph_stage
      description: "Manage the staging area. 'add' stages draft operations for commit. 'show' displays staged operations. 'clear' empties the staging area."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                action:
                  type: string
                  description: "action: add|show|clear (default add)"
                select:
                  type: string
                  description: "comma-separated operation indices to stage (default: all)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_commit:
    post:
      operationId: graph_commit
      summary: graph_commit
      description: Commit staged (or all draft) changes as a new immutable version. Clears the staging area and submitted draft operations on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                message:
                  type: string
                  description: commit message (required)
                all:
                  type: boolean
                  description: skip staging and commit all draft changes directly
                author:
                  type: string
                  description: "author identifier (default 'mcp')"
              required:
                - id
                - message
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_diff:
    post:
      operationId: graph_diff
      summary: graph_diff
      description: "Compare two versions and return the difference as a list of operations (node/edge insertions, updates, and deletions)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                v1:
                  type: number
                  description: old version number
                v2:
                  type: number
                  description: new version number
                format:
                  type: string
                  description: "output format: unified|json (default unified)"
              required:
                - id
                - v1
                - v2
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_checkout:
    post:
      operationId: graph_checkout
      summary: graph_checkout
      description: Move HEAD to a specified version without creating a new commit. Requires a clean working tree (no draft) unless --force is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                version:
                  type: number
                  description: target version number
                force:
                  type: boolean
                  description: force checkout even with dirty draft (discards draft)
              required:
                - id
                - version
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_cursor_open:
    post:
      operationId: graph_cursor_open
      summary: graph_cursor_open
      description: Open a persistent cursor over nodes or edges. Creates a draft if none exists. Returns a cursor id for subsequent operations.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                target:
                  type: string
                  description: "collection to traverse: nodes|edges (default nodes)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_cursor_get:
    post:
      operationId: graph_cursor_get
      summary: graph_cursor_get
      description: Read the current item at the cursor position.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                cursor:
                  type: string
                  description: cursor id from graph_cursor_open
              required:
                - id
                - cursor
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_cursor_move:
    post:
      operationId: graph_cursor_move
      summary: graph_cursor_move
      description: Move the cursor forward (delta=1) or backward (delta=-1).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                cursor:
                  type: string
                  description: cursor id
                delta:
                  type: number
                  description: "+1 for next, -1 for prev (default 1)"
              required:
                - id
                - cursor
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_cursor_close:
    post:
      operationId: graph_cursor_close
      summary: graph_cursor_close
      description: Close the cursor and remove its state file.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: graph id
                cursor:
                  type: string
                  description: cursor id
              required:
                - id
                - cursor
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_create:
    post:
      operationId: table_create
      summary: table_create
      description: Create a first-class data table from CSV / table XML / model JSON (separate from graph edge-list CSV or graph XML import).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  description: "table source: CSV, table XML (<table>), or model JSON"
                format:
                  type: string
                  description: csv|xml|model (default csv; not auto)
                name:
                  type: string
                  description: table display name
                id:
                  type: string
                  description: optional table id
                force:
                  type: boolean
                  description: allow create to overwrite existing table id (default false; GRAPHMCP_TABLE_CREATE_LEGACY_UPSERT=1|true restores upsert without force)
                note:
                  type: string
                  description: version note
              required:
                - content
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_import:
    post:
      operationId: table_import
      summary: table_import
      description: Import CSV / table XML / model JSON into a new or existing table id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: existing table id to overwrite (optional)
                content:
                  type: string
                  description: "table source: CSV, table XML (<table>), or model JSON"
                format:
                  type: string
                  description: csv|xml|model (default csv)
                name:
                  type: string
                  description: table name
                note:
                  type: string
                  description: version note
              required:
                - content
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_export:
    post:
      operationId: table_export
      summary: table_export
      description: "Export a stored table to CSV, JSON model, or table XML."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                to:
                  type: string
                  description: csv|model|xml (default csv)
                path:
                  type: string
                  description: optional output file path
                version:
                  type: number
                  description: version to export (default latest)
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_list:
    post:
      operationId: table_list
      summary: table_list
      description: List stored tables.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                format:
                  type: string
                  description: json|table (default json)
              required: []
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_show:
    post:
      operationId: table_show
      summary: table_show
      description: Show table metadata and rows (optionally limited).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                limit:
                  type: number
                  description: max data rows to include (default all)
                version:
                  type: number
                  description: version (default latest)
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_delete:
    post:
      operationId: table_delete
      summary: table_delete
      description: Delete a table and its versions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                force:
                  type: boolean
                  description: must be true to delete
              required:
                - id
                - force
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_history:
    post:
      operationId: table_history
      summary: table_history
      description: List table versions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_rollback:
    post:
      operationId: table_rollback
      summary: table_rollback
      description: Rollback table by re-saving an old snapshot as a new version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                version:
                  type: number
                  description: version to restore
              required:
                - id
                - version
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_update:
    post:
      operationId: table_update
      summary: table_update
      description: Apply batch patches to a table and save a new version; returns an audit summary of changes. Use dry_run to preview; detail for per-cell before/after.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                note:
                  type: string
                  description: version note
                set_cells:
                  type: string
                  description: "JSON array of {row,column|col_index,value} (row 0-based); deprecated alias col still accepted"
                add_rows:
                  type: string
                  description: JSON array of row arrays
                delete_rows:
                  type: string
                  description: JSON array of row indices
                add_columns:
                  type: string
                  description: "JSON array of {name,default?} objects"
                set_column_values:
                  type: string
                  description: "JSON {column, values:[...]} fill column"
                dry_run:
                  type: boolean
                  description: "if true, compute changes without saving (default false)"
                detail:
                  type: boolean
                  description: "if true, include per-cell before/after in details (default false)"
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_diff:
    post:
      operationId: table_diff
      summary: table_diff
      description: "Diff two table versions, or latest vs provided table content."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                v1:
                  type: number
                  description: first version (0=latest)
                v2:
                  type: number
                  description: second version (0=latest)
                content:
                  type: string
                  description: optional CSV / table XML / model JSON to diff against latest
                format:
                  type: string
                  description: csv|xml|model for content (default csv)
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_from_graph:
    post:
      operationId: table_from_graph
      summary: table_from_graph
      description: Lossy projection from graph to table (skeleton/edgelist/hierarchylist/nodelist).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graph_id:
                  type: string
                  description: source graph id
                mode:
                  type: string
                  description: skeleton|edgelist|hierarchylist|nodelist (default skeleton)
                with_hint_row:
                  type: boolean
                  description: "skeleton: add enum/hint second row"
                name:
                  type: string
                  description: output table name
                save:
                  type: boolean
                  description: save table to store (default true)
                preview_rows:
                  type: number
                  description: max rows in csv_preview (default 20; truncated responses include hint)
              required:
                - graph_id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /graph_from_table:
    post:
      operationId: graph_from_table
      summary: graph_from_table
      description: Build a graph from edge/hierarchy table columns (lossy; other columns ignored). content may be CSV / table XML / model.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table_id:
                  type: string
                  description: source table id
                content:
                  type: string
                  description: optional CSV / table XML / model JSON instead of table_id
                format:
                  type: string
                  description: csv|xml|model for content (default csv)
                from_col:
                  type: string
                  description: edge list from column
                to_col:
                  type: string
                  description: edge list to column
                label_col:
                  type: string
                  description: optional label column
                id_col:
                  type: string
                  description: hierarchy id column
                parent_col:
                  type: string
                  description: hierarchy parent column
                name:
                  type: string
                  description: graph name
                save:
                  type: boolean
                  description: save graph (default true)
              required: []
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_align:
    post:
      operationId: table_align
      summary: table_align
      description: Pad target table with missing primary-key rows (copy same-named columns when present).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                primary_id:
                  type: string
                  description: primary table id
                target_id:
                  type: string
                  description: target table to pad
                primary_key:
                  type: string
                  description: key column on primary
                target_key:
                  type: string
                  description: key column on target
                note:
                  type: string
                  description: version note
              required:
                - primary_id
                - target_id
                - primary_key
                - target_key
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_check:
    post:
      operationId: table_check
      summary: table_check
      description: "Validate table cells against allowed enums; returns a violation report table (row,field,actual,expected,suggestion)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table to check
                allowed:
                  type: string
                  description: "JSON object {column:[values]|\"a|b\"} of allowed enums"
                rules_id:
                  type: string
                  description: "optional rules table id (columns: column/field, allowed)"
                save:
                  type: boolean
                  description: save report as a new table
                ignore_hint_row:
                  type: boolean
                  description: skip first row when target.hasHintRow (default true if target has hint row; GRAPHMCP_TABLE_CHECK_LEGACY_HINT=1|true forces default false)
                name:
                  type: string
                  description: report table name
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_rules_from_graph:
    post:
      operationId: table_rules_from_graph
      summary: table_rules_from_graph
      description: "Extract enum rules table (column,allowed,hint) from mindmap skeleton heuristics (leaves=columns, children=allowed)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                graph_id:
                  type: string
                  description: source mindmap/graph id
                name:
                  type: string
                  description: rules table name
                id:
                  type: string
                  description: optional rules table id
                save:
                  type: boolean
                  description: save rules table (default true)
              required:
                - graph_id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_fix_enums:
    post:
      operationId: table_fix_enums
      summary: table_fix_enums
      description: Auto-fix enum violations using table_check suggestions; empty suggestion rows go to skipped report with reason.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: target table id
                allowed:
                  type: string
                  description: "JSON object {column:[values]|\"a|b\"} of allowed enums"
                rules_id:
                  type: string
                  description: optional rules table id
                ignore_hint_row:
                  type: boolean
                  description: skip first row when target.hasHintRow
                save:
                  type: boolean
                  description: save fixed table (default true)
                save_skipped:
                  type: boolean
                  description: save skipped violations report (default true)
                note:
                  type: string
                  description: version note
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_derive:
    post:
      operationId: table_derive
      summary: table_derive
      description: "Derive a new table from source. animation_checklist: columns containing 动画 with cell value √ become checklist rows."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source_id:
                  type: string
                  description: source table id
                mode:
                  type: string
                  description: derive mode (only animation_checklist in v1)
                name:
                  type: string
                  description: output table name
                id:
                  type: string
                  description: optional output table id
                save:
                  type: boolean
                  description: save derived table (default true)
              required:
                - source_id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_transform_column:
    post:
      operationId: table_transform_column
      summary: table_transform_column
      description: "Transform a column into another (slug: deterministic ASCII key)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                source_column:
                  type: string
                  description: source column name
                target_column:
                  type: string
                  description: target column (created if missing)
                transform:
                  type: string
                  description: transform type (only slug in v1)
                save:
                  type: boolean
                  description: save table (default true)
                note:
                  type: string
                  description: version note
              required:
                - id
                - source_column
                - target_column
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_sample_rows:
    post:
      operationId: table_sample_rows
      summary: table_sample_rows
      description: Append conservative placeholder rows (enum first allowed / 动画 default x / other TODO). Response sets placeholder=true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                count:
                  type: number
                  description: number of sample rows (default 1)
                rules_id:
                  type: string
                  description: optional rules table for enums
                save:
                  type: boolean
                  description: save table (default true)
                note:
                  type: string
                  description: version note
              required:
                - id
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
  /table_propose_rows:
    post:
      operationId: table_propose_rows
      summary: table_propose_rows
      description: Append structured object rows aligned to columns; optional enum validation via rules_id (no NL parsing).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: table id
                rows:
                  type: string
                  description: JSON array of objects keyed by column name
                rules_id:
                  type: string
                  description: "optional rules: non-empty cells validated; batch rejected on illegal enum"
                save:
                  type: boolean
                  description: save table (default true)
                note:
                  type: string
                  description: version note
              required:
                - id
                - rows
      responses:
        "200":
          description: MCP tools/call 成功返回（content 文本或结构化结果）
