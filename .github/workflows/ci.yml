# graphmcp 持续集成：构建 → 单元测试 → 冒烟 → 导出回归 → 汇总报告 → 打包制品
name: CI
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-package:
    name: 构建与测试
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make python3 imagemagick jq

      - name: 编译
        run: make all CXXFLAGS="-std=c++17 -O2 -Wall -Wextra"

      - name: 校验 OpenAPI 文档与 schema 同步
        run: |
          make docs-api
          git diff --exit-code -- docs/api_reference/openapi.yaml

      - name: 单元测试
        run: |
          mkdir -p docs/ci_results
          bash scripts/ci_capture.sh unit-main bin/graphmcp_tests
          bash scripts/ci_capture.sh unit-version bin/graphmcp_version_tests
          bash scripts/ci_capture.sh unit-cursor bin/graphmcp_cursor_tests

      - name: CLI 冒烟（新版命令族）
        env:
          SMOKE_REQUIRE_RASTER: "1"
        run: bash scripts/ci_capture.sh smoke bash tests/smoke_test.sh bin/graphmcp

      - name: MCP 协议冒烟
        env:
          GRAPHMCP_LOG: info
        run: bash scripts/ci_capture.sh mcp-smoke bash tests/mcp_smoke.sh bin/graphmcp

      - name: 表协作冒烟
        run: bash scripts/ci_capture.sh table-smoke bash tests/table_smoke.sh bin/graphmcp

      - name: MCP 性能冒烟
        env:
          # 共享 runner 抖动下大载荷常 >1s；默认脚本已 2500，CI 再留余量
          GRAPHMCP_SMOKE_MAX_LARGE_MS: "3000"
        run: bash scripts/ci_capture.sh perf-smoke python3 scripts/mcp_perf_smoke.py bin/graphmcp

      - name: 性能基准测试
        id: bench
        env:
          CI: "true"
        run: |
          # 失败告警并重试，最多 3 次；连续 3 次失败才阻断（见 scripts/bench_ci_retry.sh）
          bash scripts/ci_capture.sh bench make bench-ci CXXFLAGS="-std=c++17 -O2 -Wall -Wextra"

      - name: 样例全量导出回归
        run: bash scripts/ci_capture.sh export-testout bash scripts/export-example-testout.sh bin/graphmcp

      - name: 汇总测试报告（不重跑）
        if: always()
        run: python3 scripts/generate_docs_test_report.py --from-ci

      - name: 写入 Job Summary
        if: always()
        run: |
          if [ -f docs/TEST_REPORT.md ]; then
            cat docs/TEST_REPORT.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "docs/TEST_REPORT.md missing" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 上传汇总测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-test-report-${{ github.run_number }}
          path: |
            docs/TEST_REPORT.md
            docs/TEST_REPORT.json
            docs/SMOKE_REPORT.md
            docs/images/test-report-summary.svg
            docs/ci_results/
            bin/bench_result.json
            examples/example_testout/TEST_REPORT.md
            examples/example_testout/TEST_REPORT.json
            mcp-smoke.log
          retention-days: 30
          if-no-files-found: ignore

      # 性能基线：日常仅 bench-ci 比对（可重试）；按需 Actions「Update bench baseline」写回。

      - name: 打包制品
        run: |
          mkdir -p dist
          cp bin/graphmcp dist/
          cp README.md VERSION dist/
          tar czf "graphmcp-${GITHUB_RUN_NUMBER}.tar.gz" -C dist .

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: graphmcp-${{ github.run_number }}
          path: |
            bin/graphmcp
            graphmcp-*.tar.gz
          retention-days: 30

  sonarqube:
    name: SonarQube 静态分析
    needs: build-test-package
    runs-on: ubuntu-latest
    # 仅在 push 到 main/dev 且仓库变量启用时启动；缺少 Sonar Secrets 时仅告警并跳过分析步骤
    if: >-
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
      && vars.SONAR_ENABLED == 'true'
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: 检查 Sonar 配置
        id: sonar_precheck
        run: |
          if [ -z "${SONAR_TOKEN:-}" ] || [ -z "${SONAR_HOST_URL:-}" ]; then
            echo "::warning::SONAR_ENABLED 已开启，但缺少 SONAR_TOKEN 或 SONAR_HOST_URL，已跳过 SonarQube 分析"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 检出代码
        if: steps.sonar_precheck.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装依赖
        if: steps.sonar_precheck.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl g++ make unzip

      - name: 下载 SonarCFamily build-wrapper
        if: steps.sonar_precheck.outputs.should_run == 'true'
        run: |
          curl -fsSL "${SONAR_HOST_URL}/static/cpp/build-wrapper-linux-x86.zip" -o build-wrapper.zip
          unzip -q build-wrapper.zip

      - name: 生成 CFamily 编译数据库
        if: steps.sonar_precheck.outputs.should_run == 'true'
        run: |
          rm -rf bw-output
          ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 --out-dir bw-output \
            make all CXXFLAGS="-std=c++17 -O2 -Wall -Wextra"

      - name: SonarScanner 分析
        if: steps.sonar_precheck.outputs.should_run == 'true'
        uses: SonarSource/sonarqube-scan-action@v5

      - name: 质量门禁
        if: steps.sonar_precheck.outputs.should_run == 'true'
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 10

  mirror-to-gitlab:
    name: 同步 main 到 GitLab 备份仓
    needs: [build-test-package, sonarqube]
    runs-on: ubuntu-latest
    if: >-
      always()
      && github.event_name == 'push'
      && github.ref == 'refs/heads/main'
      && vars.GITLAB_MIRROR_ENABLED == 'true'
      && vars.GITLAB_MIRROR_URL != ''
      && needs.build-test-package.result == 'success'
      && (needs.sonarqube.result == 'success' || needs.sonarqube.result == 'skipped')
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 同步到 GitLab 仓库
        env:
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
          GITLAB_MIRROR_URL: ${{ vars.GITLAB_MIRROR_URL }}
        run: |
          set -euo pipefail
          if [ -z "${GITLAB_MIRROR_TOKEN:-}" ]; then
            echo "::warning::缺少 GITLAB_MIRROR_TOKEN，已跳过 GitLab 镜像同步"
            exit 0
          fi

          if [ -z "${GITLAB_MIRROR_URL:-}" ]; then
            echo "::warning::缺少 GITLAB_MIRROR_URL，已跳过 GitLab 镜像同步"
            exit 0
          fi

          MIRROR_URL="${GITLAB_MIRROR_URL}"
          AUTH_URL="${MIRROR_URL}"
          AUTH_URL="${AUTH_URL/https:\/\//https:\/\/oauth2:${GITLAB_MIRROR_TOKEN}@}"
          AUTH_URL="${AUTH_URL/http:\/\//http:\/\/oauth2:${GITLAB_MIRROR_TOKEN}@}"
          echo "::add-mask::${GITLAB_MIRROR_TOKEN}"
          echo "::add-mask::${AUTH_URL}"

          git remote remove gitlab-backup || true
          git remote add gitlab-backup "${AUTH_URL}"

          # 镜像同步失败不阻断主流程：最多重试 2 次，仍失败则告警并跳过
          push_ok=0
          for attempt in 1 2; do
            if git push gitlab-backup HEAD:main; then
              echo "GitLab 镜像同步成功（第 ${attempt} 次）"
              push_ok=1
              break
            fi
            echo "第 ${attempt} 次镜像同步失败"
            if [ "${attempt}" -lt 2 ]; then
              echo "等待 5 秒后重试..."
              sleep 5
            fi
          done

          if [ "${push_ok}" -ne 1 ]; then
            echo "::warning::GitLab 镜像同步连续 2 次失败，已跳过，不阻断主流程"
            exit 0
          fi
