<svg xmlns="http://www.w3.org/2000/svg" width="674" height="510" viewBox="0 0 674 510" font-family="Cascadia Code, Consolas, SF Mono, Menlo, monospace">
<rect width="674" height="510" rx="10" fill="#1e2430"/>
<path d="M0 10a10 10 0 0 1 10-10h654a10 10 0 0 1 10 10v28H0z" fill="#161b24"/>
<circle cx="20" cy="19.0" r="6" fill="#ff5f57"/>
<circle cx="38" cy="19.0" r="6" fill="#febc2e"/>
<circle cx="56" cy="19.0" r="6" fill="#28c840"/>
<text x="337.0" y="23.5" fill="#7d8899" font-size="12.5" text-anchor="middle">MCP over stdio — 25 tools</text>
<text x="18" y="68.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#5fd7a7">$ </tspan>
<tspan x="34.8" fill="#e8eef6">echo '{"jsonrpc":"2.0","id":1,"method":"initialize",...}' | graphmcp serve</tspan>
</text>
<text x="18" y="90.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">{</tspan>
</text>
<text x="18" y="112.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">  "jsonrpc":</tspan>
<tspan x="118.8" fill="#e0a978"> "2.0",</tspan>
</text>
<text x="18" y="134.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">  "id":</tspan>
<tspan x="76.8" fill="#c792ea"> 1,</tspan>
</text>
<text x="18" y="156.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">  "result":</tspan>
<tspan x="110.4" fill="#c792ea"> {</tspan>
</text>
<text x="18" y="178.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">    "protocolVersion":</tspan>
<tspan x="202.8" fill="#e0a978"> "2024-11-05",</tspan>
</text>
<text x="18" y="200.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">    "capabilities":</tspan>
<tspan x="177.6" fill="#e0a978"> { "tools": {} },</tspan>
</text>
<text x="18" y="222.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#6fc3df">    "serverInfo":</tspan>
<tspan x="160.8" fill="#e0a978"> { "name": "graphmcp", "version": "v0.1.1" }</tspan>
</text>
<text x="18" y="244.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">  }</tspan>
</text>
<text x="18" y="266.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">}</tspan>
</text>
<text x="18" y="288.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#5fd7a7">$ </tspan>
<tspan x="34.8" fill="#e8eef6">echo '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' | graphmcp serve</tspan>
</text>
<text x="18" y="310.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">  → 25 tools:  graph_create   graph_convert   graph_export</tspan>
</text>
<text x="18" y="332.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_open     graph_import    graph_validate</tspan>
</text>
<text x="18" y="354.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_list     graph_history   graph_rollback</tspan>
</text>
<text x="18" y="376.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_layout   graph_delete    graph_show</tspan>
</text>
<text x="18" y="398.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_update   graph_insert    graph_delete_element</tspan>
</text>
<text x="18" y="420.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_status   graph_draft     graph_stage</tspan>
</text>
<text x="18" y="442.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_commit   graph_diff      graph_checkout</tspan>
</text>
<text x="18" y="464.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_cursor_open  graph_cursor_get</tspan>
</text>
<text x="18" y="486.0" font-size="14" xml:space="preserve">
<tspan x="18.0" fill="#c9d4e3">               graph_cursor_move  graph_cursor_close</tspan>
</text>
</svg>