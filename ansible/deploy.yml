---
# Ansible playbook: deploy the graphmcp binary to target servers.
# usage: ansible-playbook -i inventory.ini deploy.yml -e artifact=/path/graphmcp-N.tar.gz
- name: Deploy graphmcp
  hosts: graphmcp_servers
  become: true
  vars:
    install_dir: /opt/graphmcp
    artifact: "{{ artifact | default('graphmcp.tar.gz') }}"

  tasks:
    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ install_dir }}"
        state: directory
        mode: "0755"

    - name: Unpack release artifact
      ansible.builtin.unarchive:
        src: "{{ artifact }}"
        dest: "{{ install_dir }}"
        mode: "0755"

    - name: Symlink binary into PATH
      ansible.builtin.file:
        src: "{{ install_dir }}/graphmcp"
        dest: /usr/local/bin/graphmcp
        state: link

    - name: Ensure store directory exists
      ansible.builtin.file:
        path: /var/lib/graphmcp/store
        state: directory
        mode: "0775"

    - name: Verify deployed binary responds
      ansible.builtin.command: /usr/local/bin/graphmcp list
      environment:
        GRAPHMCP_STORE: /var/lib/graphmcp/store
      register: verify
      changed_when: false

    - name: Show verification output
      ansible.builtin.debug:
        var: verify.stdout_lines
