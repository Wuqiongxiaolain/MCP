# SonarQube static analysis configuration for graphmcp
sonar.projectKey=graphmcp
sonar.projectName=graphmcp - Graph Design & Drawing MCP Tool
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# C++ analysis (SonarCFamily needs build-wrapper output; community
# alternative: sonar-cxx plugin reads the same sources directly)
sonar.cfamily.build-wrapper-output=bw-output
sonar.cfamily.threads=2

# exclusions: generated artifacts and stores
sonar.exclusions=bin/**,dist/**,graph-store/**,ci-store/**,test-store-tmp/**
