name: CD 制品发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '试运行（仅构建+上传制品，不创建 Release）'
        type: boolean
        default: true
      ref:
        description: '要构建的分支/commit（留空则用默认分支）'
        type: string
        default: ''

permissions: {}

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    name: 构建 ${{ matrix.label }} 制品
    if: ${{ !github.event.deleted }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            platform: linux-x64
          - os: macos-latest
            label: macOS
            platform: macos-x64
          - os: windows-latest
            label: Windows
            platform: windows-x64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: 安装构建依赖（Linux）
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make

      - name: 构建（Linux/macOS）
        if: matrix.os != 'windows-latest'
        run: |
          make all CXXFLAGS="-std=c++17 -O2 -Wall -Wextra"

      - name: 测试（Linux/macOS）
        if: matrix.os != 'windows-latest'
        run: |
          make test CXXFLAGS="-std=c++17 -O2 -Wall -Wextra"

      - name: 安装构建依赖（Windows）
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            make

      - name: 构建（Windows）
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p bin
          make all \
            CXXFLAGS="-std=c++17 -O2 -Wall -Wextra" \
            MKDIR="mkdir -p \$(BIN)" \
            EXE=".exe" \
            STATIC="-static -static-libgcc -static-libstdc++"

      - name: 测试（Windows）
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir -p bin
          make test \
            CXXFLAGS="-std=c++17 -O2 -Wall -Wextra" \
            MKDIR="mkdir -p \$(BIN)" \
            EXE=".exe"

      - name: 打包（Linux/macOS）
        if: matrix.os != 'windows-latest'
        run: |
          set -euo pipefail
          mkdir -p dist
          cp bin/graphmcp dist/
          cp README.md VERSION dist/
          # 可选增益：产品 Skill 包（安装 MCP ≠ 安装 Skill）
          if [ -d skills/graphmcp ]; then
            mkdir -p dist/skills
            cp -R skills/graphmcp dist/skills/
          fi
          ASSET_NAME="graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz"
          tar czf "${ASSET_NAME}" -C dist .

      - name: 打包（Windows）
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "bin/graphmcp.exe" "dist/graphmcp.exe"
          Copy-Item "README.md" "dist/README.md"
          Copy-Item "VERSION" "dist/VERSION"
          if (Test-Path "skills/graphmcp") {
            New-Item -ItemType Directory -Path "dist/skills" -Force | Out-Null
            Copy-Item -Recurse "skills/graphmcp" "dist/skills/graphmcp"
          }
          $asset_name = "graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.zip"
          if (Test-Path $asset_name) { Remove-Item $asset_name -Force }
          Compress-Archive -Path "dist/*" -DestinationPath $asset_name

      - name: 上传构建制品（Linux/macOS）
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          path: graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          retention-days: 30

      - name: 上传构建制品（Windows）
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.zip
          path: graphmcp-${{ github.ref_name }}-${{ matrix.platform }}.zip
          retention-days: 30

  release:
    name: 发布 GitHub Release
    needs: build-package
    if: ${{ !github.event.deleted && (github.event_name != 'workflow_dispatch' || inputs.dry_run != true) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: 检出代码（读取 annotated tag message）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          fetch-tags: true

      - name: 组装 Release 导语（tag message + 制品说明）
        run: |
          set -euo pipefail
          NOTE_FILE=release-notes.md
          : > "$NOTE_FILE"

          if [ "${{ github.ref_type }}" = "tag" ]; then
            # annotated tag：%(contents) = 主题 + 正文；轻量 tag 为空
            git tag -l --format='%(contents)' "${{ github.ref_name }}" > "$NOTE_FILE"
          fi

          if [ ! -s "$NOTE_FILE" ]; then
            printf '%s\n' \
              "graphmcp ${{ github.ref_name }}" \
              "" \
              "（无 annotated tag message。发版请使用 git tag -a 并填写说明。）" \
              > "$NOTE_FILE"
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "制品由 CD 自动构建上传。"
            echo "- Tag：\`${{ github.ref_name }}\`"
            echo "- Commit：\`${{ github.sha }}\`"
            echo "- 平台：Linux / Windows / macOS"
            echo ""
            echo "下方为 GitHub 自动生成的变更摘要与 Full Changelog 对比链接。"
          } >> "$NOTE_FILE"

      - name: 下载全部平台制品
        uses: actions/download-artifact@v4
        with:
          pattern: graphmcp-${{ github.ref_name }}-*
          path: release-assets
          merge-multiple: true

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: graphmcp ${{ github.ref_name }}
          # tag message（body_path）在前，自动 notes（含 Full Changelog）接在后面
          generate_release_notes: true
          body_path: release-notes.md
          files: release-assets/*
          fail_on_unmatched_files: true
